<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <!-- Clean shield shape -->
  <path d="M40 12 C40 12 55 8 60 8 C65 8 80 12 80 12 L80 42 C80 60 60 78 60 78 C60 78 40 60 40 42 Z" fill="#003366" stroke="#00A3E0" stroke-width="1.5"/>
  <!-- Inner shield highlight -->
  <path d="M46 18 C46 18 55 15 60 15 C65 15 74 18 74 18 L74 40 C74 54 60 68 60 68 C60 68 46 54 46 40 Z" fill="none" stroke="#00A3E0" stroke-width="0.5" opacity="0.3"/>
  <!-- Central network hub -->
  <circle cx="60" cy="32" r="5" fill="#00A3E0"/>
  <!-- Outer network nodes -->
  <circle cx="50" cy="46" r="3" fill="#00A3E0"/>
  <circle cx="70" cy="46" r="3" fill="#00A3E0"/>
  <circle cx="60" cy="58" r="3" fill="#00A3E0"/>
  <!-- Connection lines -->
  <line x1="60" y1="32" x2="50" y2="46" stroke="#00A3E0" stroke-width="1.2" opacity="0.6"/>
  <line x1="60" y1="32" x2="70" y2="46" stroke="#00A3E0" stroke-width="1.2" opacity="0.6"/>
  <line x1="50" y1="46" x2="60" y2="58" stroke="#00A3E0" stroke-width="1.2" opacity="0.6"/>
  <line x1="70" y1="46" x2="60" y2="58" stroke="#00A3E0" stroke-width="1.2" opacity="0.6"/>
  <!-- COM text -->
  <text x="100" y="48" font-family="Calibri, Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#003366" letter-spacing="4">COM</text>
  <!-- Accent divider line -->
  <rect x="100" y="53" width="120" height="2" rx="1" fill="#00A3E0"/>
  <!-- SYSTEMS text -->
  <text x="100" y="72" font-family="Calibri, Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#003366" letter-spacing="7">SYSTEMS</text>
  <!-- INC superscript -->
  <text x="218" y="42" font-family="Calibri, Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#00A3E0" letter-spacing="1.5">INC</text>
</svg>
