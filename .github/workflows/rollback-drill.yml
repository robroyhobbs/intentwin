name: Rollback Drill

on:
  schedule:
    - cron: "0 15 1 * *"
  workflow_dispatch:

concurrency:
  group: rollback-drill
  cancel-in-progress: true

jobs:
  drill:
    name: Validate rollback readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DRILL_ROLLBACK_WEBHOOK_URL: ${{ secrets.DRILL_ROLLBACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-drill smoke
        run: bash scripts/smoke-production.sh

      - name: Trigger rollback drill webhook
        run: |
          if [ -z "${DRILL_ROLLBACK_WEBHOOK_URL:-}" ]; then
            echo "Missing DRILL_ROLLBACK_WEBHOOK_URL secret"
            exit 1
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            --data "{\"source\":\"rollback-drill\",\"run_id\":\"${GITHUB_RUN_ID}\"}" \
            "$DRILL_ROLLBACK_WEBHOOK_URL" >/dev/null

      - name: Post-drill smoke
        run: bash scripts/smoke-production.sh

      - name: Notify failure
        if: failure()
        run: |
          chmod +x scripts/send-alert.sh
          bash scripts/send-alert.sh \
            "rollback-drill failed (${GITHUB_REPOSITORY})" \
            "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
