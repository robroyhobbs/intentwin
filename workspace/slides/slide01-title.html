<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1B365D; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.accent-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 8pt;
  background: #12ABDB;
}
.logo-area {
  position: absolute; top: 30pt; right: 40pt;
}
.content {
  text-align: center; margin-top: 40pt;
}
h1 {
  color: #ffffff; font-size: 42pt; margin: 0 0 20pt 0; font-weight: bold;
}
h2 {
  color: #12ABDB; font-size: 22pt; margin: 0 0 30pt 0; font-weight: normal;
}
.tagline {
  color: #ffffff; font-size: 16pt; opacity: 0.9;
}
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 40pt;
  background: #0070AD; display: flex; align-items: center; justify-content: center;
}
.bottom-text {
  color: #ffffff; font-size: 11pt;
}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="content">
  <h1>ProposalAI</h1>
  <h2>Intelligent Proposal Generation</h2>
  <p class="tagline">Transforming How Capgemini Wins Business</p>
</div>
<div class="bottom-bar">
  <p class="bottom-text">Capgemini Internal | Stakeholder Presentation</p>
</div>
</body>
</html>
